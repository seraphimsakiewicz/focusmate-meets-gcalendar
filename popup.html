<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4285f4, #34a853);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Auth */
    .auth-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #34a853; }
    .status-dot.disconnected { background: #ea4335; }

    .status-text {
      font-size: 12px;
      color: #aaa;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: #4285f4;
      color: #fff;
    }

    .btn-primary:hover { background: #3b78e7; }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #ccc;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.14); }

    .btn-danger {
      background: rgba(234, 67, 53, 0.15);
      color: #ea4335;
    }

    .btn-danger:hover { background: rgba(234, 67, 53, 0.25); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input {
      display: none;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 11px;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: #4285f4;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(18px);
    }

    /* Footer */
    .footer {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sync-info {
      font-size: 11px;
      color: #666;
    }

    .error-text {
      color: #ea4335;
      font-size: 11px;
      margin-top: 6px;
    }

    .hidden { display: none; }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">📅</div>
    <div class="header-text">
      <h1>Focusmate Calendar Overlay</h1>
      <p>Google Calendar → Focusmate</p>
    </div>
  </div>

  <!-- Not signed in -->
  <div class="section" id="auth-section">
    <div class="auth-status">
      <div class="status-dot disconnected" id="status-dot"></div>
      <span class="status-text" id="status-text">Not connected</span>
    </div>

    <div id="sign-in-area">
      <button class="btn btn-primary" id="btn-sign-in">
        Sign in with Google
      </button>
    </div>

    <div id="signed-in-area" class="hidden">
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-refresh">↻ Refresh</button>
        <button class="btn btn-danger" id="btn-sign-out">Sign out</button>
      </div>
    </div>

    <div class="error-text hidden" id="error-text"></div>
  </div>

  <!-- Toggle -->
  <div class="section" id="toggle-section">
    <div class="toggle-row">
      <span class="toggle-label">Show overlay</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-enabled" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <div class="footer">
    <span class="sync-info" id="sync-info">—</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
